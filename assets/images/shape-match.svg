<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5f3"/>
      <stop offset="100%" style="stop-color:#f9e8d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" rx="20"/>
  
  <!-- Connection lines -->
  <line x1="80" y1="80" x2="320" y2="220" stroke="#2DBCAF" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="80" y1="220" x2="320" y2="80" stroke="#2DBCAF" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Left shapes -->
  <g filter="url(#shadow)">
    <!-- Circle top-left -->
    <circle cx="80" cy="80" r="35" fill="#fff" stroke="#e2e8f0" stroke-width="3"/>
    <circle cx="80" cy="80" r="22" fill="#3B82F6"/>
    
    <!-- Square bottom-left -->
    <rect x="45" y="185" width="70" height="70" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="3"/>
    <rect x="58" y="198" width="44" height="44" rx="4" fill="#EF4444"/>
  </g>
  
  <!-- Right shapes -->
  <g filter="url(#shadow)">
    <!-- Square top-right -->
    <rect x="285" y="45" width="70" height="70" rx="12" fill="#fff" stroke="#2DBCAF" stroke-width="3"/>
    <rect x="298" y="58" width="44" height="44" rx="4" fill="#EF4444"/>
    
    <!-- Circle bottom-right -->
    <circle cx="320" cy="220" r="35" fill="#fff" stroke="#2DBCAF" stroke-width="3"/>
    <circle cx="320" cy="220" r="22" fill="#3B82F6"/>
  </g>
  
  <!-- Center star decoration -->
  <g filter="url(#shadow)" transform="translate(200, 150)">
    <polygon points="0,-25 7,-8 25,-8 11,4 17,22 0,12 -17,22 -11,4 -25,-8 -7,-8" fill="#F59E0B" opacity="0.9"/>
  </g>
  
  <!-- Title area -->
  <rect x="100" y="255" width="200" height="35" rx="17" fill="#2DBCAF"/>
  <text x="200" y="278" text-anchor="middle" fill="#fff" font-family="sans-serif" font-weight="bold" font-size="14">Hubungkan Bentuk</text>
</svg>
