<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" width="1536" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ede9fe;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00000044"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1536" height="1024" fill="url(#bgGrad)"/>

  <!-- Decorative circles background -->
  <circle cx="100" cy="100" r="120" fill="white" opacity="0.05"/>
  <circle cx="1436" cy="924" r="150" fill="white" opacity="0.05"/>
  <circle cx="1450" cy="80" r="80" fill="white" opacity="0.05"/>
  <circle cx="80" cy="950" r="100" fill="white" opacity="0.05"/>
  <circle cx="768" cy="512" r="400" fill="white" opacity="0.03"/>

  <!-- Stars -->
  <circle cx="120" cy="80" r="8" fill="white" opacity="0.5"/>
  <circle cx="200" cy="200" r="5" fill="white" opacity="0.4"/>
  <circle cx="1400" cy="120" r="7" fill="white" opacity="0.5"/>
  <circle cx="1300" cy="60" r="5" fill="white" opacity="0.4"/>
  <circle cx="60" cy="500" r="6" fill="white" opacity="0.3"/>
  <circle cx="1490" cy="500" r="8" fill="white" opacity="0.3"/>
  <circle cx="768" cy="40" r="5" fill="white" opacity="0.4"/>
  <circle cx="400" cy="900" r="7" fill="white" opacity="0.3"/>
  <circle cx="1100" cy="950" r="6" fill="white" opacity="0.3"/>

  <!-- Title text -->
  <text x="768" y="110" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="72" font-weight="bold" fill="white" filter="url(#shadow)">🐾 Pasangkan Bayangan Hewan</text>

  <!-- Main white card -->
  <rect x="160" y="160" width="1216" height="680" rx="60" fill="url(#cardGrad)" filter="url(#cardShadow)"/>

  <!-- ====== LEFT SIDE: Shadow question ====== -->
  <!-- Shadow box background -->
  <rect x="220" y="210" width="500" height="560" rx="40" fill="#f3e8ff" opacity="0.7"/>
  <text x="470" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#7c3aed" opacity="0.7">BAYANGAN</text>

  <!-- Shadow box inner -->
  <rect x="260" y="295" width="420" height="420" rx="30" fill="#1e0a3c" opacity="0.12"/>

  <!-- Large silhouette emoji (lion) rendered dark -->
  <text x="470" y="580" text-anchor="middle" font-size="280" fill="#1a0a2e" opacity="0.9">🦁</text>
  <!-- Dark overlay for silhouette effect -->
  <rect x="270" y="305" width="400" height="395" rx="24" fill="#1a0a2e" opacity="0.78"/>

  <!-- Question mark -->
  <text x="470" y="570" text-anchor="middle" font-size="200" fill="white" font-weight="bold" opacity="0.95">?</text>

  <!-- ====== ARROW in the middle ====== -->
  <text x="768" y="540" text-anchor="middle" font-size="120" fill="#7c3aed" opacity="0.7">→</text>

  <!-- ====== RIGHT SIDE: Answer options ====== -->
  <rect x="830" y="210" width="500" height="560" rx="40" fill="#f3e8ff" opacity="0.7"/>
  <text x="1080" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#7c3aed" opacity="0.7">PILIH!</text>

  <!-- Option 1 - CORRECT (green highlight) -->
  <rect x="860" y="295" width="210" height="210" rx="24" fill="#dcfce7"/>
  <rect x="860" y="295" width="210" height="210" rx="24" fill="none" stroke="#16a34a" stroke-width="8"/>
  <text x="965" y="430" text-anchor="middle" font-size="120">🦁</text>
  <!-- Green checkmark badge -->
  <circle cx="1055" cy="310" r="32" fill="#16a34a"/>
  <text x="1055" y="323" text-anchor="middle" font-size="32" fill="white" font-weight="bold">✓</text>

  <!-- Option 2 -->
  <rect x="1090" y="295" width="210" height="210" rx="24" fill="white" stroke="#e2e8f0" stroke-width="6"/>
  <text x="1195" y="430" text-anchor="middle" font-size="120">🐘</text>

  <!-- Option 3 -->
  <rect x="860" y="525" width="210" height="210" rx="24" fill="white" stroke="#e2e8f0" stroke-width="6"/>
  <text x="965" y="660" text-anchor="middle" font-size="120">🐯</text>

  <!-- Option 4 -->
  <rect x="1090" y="525" width="210" height="210" rx="24" fill="white" stroke="#e2e8f0" stroke-width="6"/>
  <text x="1195" y="660" text-anchor="middle" font-size="120">🐻</text>

  <!-- Bottom label -->
  <rect x="380" y="870" width="776" height="60" rx="30" fill="#7c3aed" opacity="0.15"/>
  <text x="768" y="910" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="38" font-weight="bold" fill="#5b21b6">Cocokkan bayangan dengan hewannya! 🎯</text>
</svg>
